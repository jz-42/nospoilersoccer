name: Update World Cup data

on:
  workflow_dispatch: {}

# One loop at a time; Cloudflare only dispatches a new run when none is active.
concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Poll every 5 minutes for ~53 minutes. Each cycle pulls results + odds +
      # spoiler-free highlights, validates, and commits ONLY if something changed.
      # Cloudflare decides when to start each run and checks every 5 minutes.
      - name: Update loop (every 5 min)
        env:
          # Accept any of the names this secret has been stored under.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.OPENAI_REVIEW_KEY || secrets.GPT_VIDEO_REVIEW_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CURATOR_ERROR_FLAG: /tmp/curator-error
          ENTERTAINMENT_AUDIT_FILE: /tmp/entertainment-audit.md
          ENTERTAINMENT_BACKUP_FILE: /tmp/wc2026-entertainment.ts.before
          # Optional: OPENAI_MODEL (default gpt-5.4), OPENAI_REASONING_EFFORT (default medium)
        run: |
          git config user.name "results-bot"
          git config user.email "actions@github.com"
          deadline=$(( $(date +%s) + 3180 ))
          cycle=0
          while : ; do
            cycle=$((cycle + 1))
            echo "::group::cycle $cycle — $(date -u '+%H:%M:%SZ')"
            rm -f "$CURATOR_ERROR_FLAG"
            rm -f "$ENTERTAINMENT_AUDIT_FILE"

            # Core updater path: keep this independent from optional entertainment AI.
            npx tsx scripts/update-results.ts || echo "::warning::results step errored this cycle"
            npx tsx scripts/fetch-odds.ts     || echo "::warning::odds step errored this cycle"
            npx tsx scripts/curate-videos.ts  || echo "::warning::curator step errored this cycle"

            core_ok=false
            if npm run check:update; then
              core_ok=true
            fi

            core_ready_for_entertainment=false
            if [ "$core_ok" = true ]; then
              git add src/data/wc2026.ts src/data/wc2026-videos.ts scripts/curate-skip.json scripts/curate-ai-rejections.json
              if git diff --cached --quiet; then
                echo "no core changes this cycle"
                core_ready_for_entertainment=true
              else
                git commit -m "Auto-update: World Cup 2026 data ($(date -u '+%F %H:%MZ'))"
                git pull --rebase --autostash origin main || true
                if git push origin HEAD:main; then
                  core_ready_for_entertainment=true
                else
                  echo "::warning::push to main failed; will retry next cycle"
                fi
                git push origin HEAD:dev  || echo "dev has diverged; skipping"
              fi
            else
              echo "::error::validation failed — not committing this cycle"
              touch "$CURATOR_ERROR_FLAG"
            fi

            # Optional entertainment AI path: never let this block core updates.
            if [ "$core_ready_for_entertainment" = true ]; then
              rm -f "$ENTERTAINMENT_AUDIT_FILE"
              cp src/data/wc2026-entertainment.ts "$ENTERTAINMENT_BACKUP_FILE"
              entertainment_ok=false
              if npx tsx scripts/curate-entertainment.ts; then
                entertainment_ok=true
              else
                echo "::warning::entertainment step errored this cycle"
                cp "$ENTERTAINMENT_BACKUP_FILE" src/data/wc2026-entertainment.ts
                {
                  echo "### Entertainment audit — cycle $cycle"
                  echo "- reason: entertainment_step_error"
                  echo "- action: skipped entertainment curation for this cycle"
                  echo
                } >> "$GITHUB_STEP_SUMMARY"
              fi
              if [ -f "$ENTERTAINMENT_AUDIT_FILE" ]; then
                {
                  echo "### Entertainment audit — cycle $cycle"
                  cat "$ENTERTAINMENT_AUDIT_FILE"
                  echo
                } >> "$GITHUB_STEP_SUMMARY"
              fi
              if [ "$entertainment_ok" = true ] && ! cmp -s "$ENTERTAINMENT_BACKUP_FILE" src/data/wc2026-entertainment.ts; then
                if npm run check:update; then
                  git add src/data/wc2026-entertainment.ts
                  if git diff --cached --quiet; then
                    echo "no entertainment changes this cycle"
                  else
                    git commit -m "Auto-update: World Cup 2026 entertainment ($(date -u '+%F %H:%MZ'))"
                    git pull --rebase --autostash origin main || true
                    if git push origin HEAD:main; then
                      git push origin HEAD:dev  || echo "dev has diverged; skipping"
                    else
                      echo "::warning::entertainment push to main failed; discarding local entertainment commit"
                      git fetch origin main && git reset --hard origin/main || echo "::warning::failed to restore local main after entertainment push failure"
                    fi
                  fi
                else
                  echo "::warning::entertainment validation failed; discarding entertainment changes"
                  cp "$ENTERTAINMENT_BACKUP_FILE" src/data/wc2026-entertainment.ts
                  {
                    echo "### Entertainment audit — cycle $cycle"
                    echo "- reason: entertainment_validation_failed"
                    echo "- action: discarded entertainment changes for this cycle"
                    echo
                  } >> "$GITHUB_STEP_SUMMARY"
                fi
              fi
            else
              echo "::notice::skipping optional entertainment curation because core updater did not reach a clean commit point"
            fi
            echo "::endgroup::"
            [ "$(date +%s)" -ge "$deadline" ] && break
            sleep 300
          done
          # Fail the run (so GitHub emails you) only if the LAST cycle had a real
          # problem — bad data or a persistent curator error (e.g. a dead key).
          if [ -f "$CURATOR_ERROR_FLAG" ]; then
            echo "::error::Last cycle reported errors — check the run summary."
            exit 1
          fi
